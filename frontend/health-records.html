<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Records - Medical AI Assistant</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🏥 Medical AI</h2>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><span>📊</span> Dashboard</a></li>
                    <li class="nav-item"><a href="profile.html" class="nav-link"><span>👤</span> Profile</a></li>
                    <li class="nav-item"><a href="skin-analysis.html" class="nav-link"><span>🔬</span> Skin Analysis</a></li>
                    <li class="nav-item"><a href="lab-analysis.html" class="nav-link"><span>🧪</span> Lab Results</a></li>
                    <li class="nav-item"><a href="chatbot.html" class="nav-link"><span>💬</span> AI Chatbot</a></li>
                    <li class="nav-item"><a href="sound-analysis.html" class="nav-link"><span>🎤</span> Sound Analysis</a></li>
                    <li class="nav-item"><a href="health-records.html" class="nav-link active"><span>📋</span> Health Records</a></li>
                    <li class="nav-item"><a href="about.html" class="nav-link"><span>ℹ️</span> About Us</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link"><span>📧</span> Contact</a></li>
                    <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><span>🚪</span> Logout</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>📋 Health Records</h1>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Your Medical History</h2>
                    <select id="filterType" onchange="filterRecords()" style="padding: 8px; border-radius: 5px; border: 2px solid var(--light-color);">
                        <option value="all">All Records</option>
                        <option value="skin">Skin Analysis</option>
                        <option value="lab">Lab Results</option>
                        <option value="sound">Sound Analysis</option>
                    </select>
                </div>

                <div id="recordsContainer">
                    <p style="text-align: center; color: #7f8c8d;">Loading records...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        checkAuth();

        let allRecords = [];

        loadRecords();

        async function loadRecords() {
            try {
                const records = await apiCall('/records');
                allRecords = records;
                displayRecords(records);
            } catch (error) {
                document.getElementById('recordsContainer').innerHTML = `
                    <div class="message error">Failed to load records</div>
                `;
            }
        }

        function filterRecords() {
            const filterType = document.getElementById('filterType').value;
            
            if (filterType === 'all') {
                displayRecords(allRecords);
            } else {
                const filtered = allRecords.filter(r => r.record_type === filterType);
                displayRecords(filtered);
            }
        }

        function displayRecords(records) {
            const container = document.getElementById('recordsContainer');
            
            if (!records || records.length === 0) {
                container.innerHTML = `
                    <p style="text-align: center; color: #7f8c8d; padding: 40px;">
                        No records found. Start by analyzing your health!
                    </p>
                `;
                return;
            }

            container.innerHTML = records.map(record => `
                <div class="result-box" style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                        <div>
                            <h3 style="margin-bottom: 5px;">
                                ${getRecordIcon(record.record_type)} ${record.record_type.toUpperCase()} Analysis
                            </h3>
                            <small style="color: #95a5a6;">${formatDate(record.created_at)}</small>
                        </div>
                        <span class="severity-badge severity-${record.severity}">${record.severity.toUpperCase()}</span>
                    </div>
                    
                    <div class="result-item">
                        <div class="result-label">Diagnosis</div>
                        <div class="result-value">${record.diagnosis}</div>
                    </div>
                    
                    <div class="result-item">
                        <div class="result-label">Treatment</div>
                        <div class="result-value">${record.treatment}</div>
                    </div>
                </div>
            `).join('');
        }

        function getRecordIcon(type) {
            const icons = {
                'skin': '🔬',
                'lab': '🧪',
                'sound': '🎤'
            };
            return icons[type] || '📋';
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
